# Blueprint: API, Frontend, Postgres, Redis.
# All non-sensitive env vars are defined here. Do not duplicate these in the Render Dashboard.
# Secrets (TELEGRAM_TOKEN, GEMINI_API_KEY, HF_TOKEN, etc.) come only from the Environment Group.

services:
  # Backend API + Telegram bot
  - type: web
    name: escape-room-telegram-api
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: .
    repo: https://github.com/Itamarabir1/escape-room-telegram
    plan: free
    envVars:
      # Infrastructure (from linked resources – do not override in Dashboard)
      - key: DATABASE_URL
        fromDatabase:
          name: escape-room-telegram-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: escape-room-telegram-redis
          type: keyvalue
          property: connectionString
      # Non-sensitive: URLs, mode, Telegram app identifiers (public – not secrets)
      - key: API_BASE_URL
        value: https://escape-room-telegram-api.onrender.com
      - key: WEBAPP_URL
        value: https://escape-room-telegram.onrender.com
      - key: ENV
        value: production
      - key: TELEGRAM_BOT_USERNAME
        value: MasterAI_Game_bot
      - key: TELEGRAM_MINI_APP_SHORT_NAME
        value: escape_room
      # Secrets only: TELEGRAM_TOKEN, GEMINI_API_KEY, HF_TOKEN
      - fromGroup: escape-room-secrets

  # Frontend SPA (nginx). No secrets needed – only VITE_* build args.
  - type: web
    name: escape-room-telegram
    runtime: docker
    dockerfilePath: frontend/Dockerfile
    dockerContext: .
    repo: https://github.com/Itamarabir1/escape-room-telegram
    plan: free
    envVars:
      - key: VITE_API_URL
        value: https://escape-room-telegram-api.onrender.com
      - key: VITE_BASE_PATH
        value: /

  # Key Value (Redis-compatible) – must be in services with type: keyvalue
  - type: keyvalue
    name: escape-room-telegram-redis
    plan: free
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere

# Infrastructure
databases:
  - name: escape-room-telegram-postgres
    plan: free
    databaseName: escape_room_db