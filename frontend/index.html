<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>חדר בריחה AI</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    #boot-loading {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: #000;
      color: #fff;
      font-family: sans-serif;
      transition: opacity 220ms ease;
    }

    #boot-loading.boot-loading--hidden {
      opacity: 0;
      pointer-events: none;
    }

    .boot-loading-spinner {
      width: 54px;
      height: 54px;
      border: 3px solid rgba(255, 255, 255, 0.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: boot-loading-spin 0.9s linear infinite;
    }

    .boot-loading-text {
      margin: 0;
      font-size: 1.1rem;
      letter-spacing: 0.02em;
    }

    @keyframes boot-loading-spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <div id="boot-loading" aria-live="polite">
    <div class="boot-loading-spinner" aria-hidden="true"></div>
    <p class="boot-loading-text">טוען…</p>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
